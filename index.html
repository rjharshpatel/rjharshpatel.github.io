<style>

  .project-tag.py  { background: var(--blue-light); color: var(--blue); border-color: transparent; }
  .project-tag.sql { background: var(--teal-light); color: var(--teal); border-color: transparent; }
  .project-tag.pbi { background: var(--gold-light); color: var(--gold); border-color: transparent; }
  .project-tag.ml  { background: var(--accent-light); color: var(--accent); border-color: transparent; }
  .project-arrow { font-size: 20px; color: var(--ink3); margin-top: 4px; }

  .exp-block { display: grid; grid-template-columns: 200px 1fr; gap: 3rem; padding: 2rem 0; border-bottom: 1px solid var(--border); }
  .exp-block:last-child { border-bottom: none; }

  .exp-org-sub { font-size: 11px; color: var(--ink3); font-family: var(--font-mono); }

  .edu-degree { font-family: var(--font-display); font-size: 1.2rem; color: var(--ink); margin-bottom: 0.3rem; }

<script>
/* ── Render engine ── */
const d = DATA;

/* NAV */

  <div class="nav-logo">${d.info.name_line1.toUpperCase()} ${d.info.name_line2.toUpperCase()} / PORTFOLIO</div>

    <a href="#projects-sec">Projects</a>

    <a href="#experience-sec">Experience</a>
    <a href="#education-sec">Education</a>
    ${d.resume.url ? `<a href="${d.resume.url}" class="nav-resume-btn" download>↓ Resume</a>` : ''}
  </div>`;

/* STATS */
const statsHTML = d.stats.map(s => `
  <div class="stat-cell">
    <span class="stat-num">${s.num}</span>
    <span class="stat-label">${s.label}</span>
  </div>`).join('');

/* CONTACT */

  <div class="contact-item"><div class="contact-icon">@</div><a href="mailto:${d.info.email}">${d.info.email}</a></div>

  <div class="contact-item"><div class="contact-icon">in</div><a href="${d.info.linkedin_url}" target="_blank">${d.info.linkedin_label}</a></div>
  <div class="contact-item"><div class="contact-icon">⌖</div>${d.info.location}</div>`;

/* CTA BUTTONS */
const ctaHTML = `
  <a href="mailto:${d.info.email}" class="btn-primary">Get in touch</a>
  <a href="${d.info.linkedin_url}" class="btn-outline" target="_blank">LinkedIn ↗</a>
  ${d.resume.url ? `<a href="${d.resume.url}" class="btn-resume" download>↓ ${d.resume.label}</a>` : ''}`;

/* HERO */
document.getElementById('hero').innerHTML = `
  <div class="hero-left">
    <div class="hero-eyebrow">${d.info.eyebrow}</div>
    <h1 class="hero-name">${d.info.name_line1}<br><em>${d.info.name_line2}</em></h1>
    <p class="hero-title">${d.info.tagline}</p>
    <p class="hero-bio">${d.info.bio}</p>

  </div>
  <div class="hero-right">
    <div class="stat-grid">${statsHTML}</div>
    <div class="contact-row">${contactHTML}</div>
  </div>`;

/* PROJECTS */
const projectsHTML = d.projects.map(p => {
  const tagsHTML = p.tags.map(t => `<span class="project-tag ${t.style}">${t.label}</span>`).join('');

    <div class="project-card">
      <div>
        <div class="project-num">${p.num}</div>
        <div class="project-title">${p.title}</div>
        <div class="project-desc">${p.desc}</div>
        <div class="project-tags">${tagsHTML}</div>
      </div>
      <div class="project-arrow">↗</div>
    </div>`;
}).join('');
document.getElementById('projects-sec').innerHTML = `
  <div class="section-header"><span class="section-num">01</span><h2 class="section-title">Projects</h2></div>
  <div class="projects-list">${projectsHTML}</div>`;

/* SKILLS */
const skillsHTML = d.skills.map(g => {
  const tagsHTML = g.tags.map(t => `<span class="skill-tag${t.highlight ? ' highlight' : ''}">${t.label}</span>`).join('');
  return `
    <div class="skill-group">
      <div class="skill-group-label">${g.group}</div>
      <div class="skill-tags">${tagsHTML}</div>
    </div>`;
}).join('');
document.getElementById('skills-sec').innerHTML = `
  <div class="section-header"><span class="section-num">02</span><h2 class="section-title">Skills</h2></div>
  <div class="skills-grid">${skillsHTML}</div>`;

/* EXPERIENCE */
const expHTML = d.experience.map(e => {
  const bulletsHTML = e.bullets.map(b => `<li>${b}</li>`).join('');
  return `
    <div class="exp-block">
      <div class="exp-meta">
        <span class="exp-org">${e.org}</span>
        ${e.org_sub ? `<span class="exp-org-sub">${e.org_sub}</span>` : ''}
        <span class="exp-date">${e.date}</span>
      </div>
      <div>
        <div class="exp-title">${e.title}</div>
        <ul class="exp-bullets">${bulletsHTML}</ul>
      </div>
    </div>`;
}).join('');
document.getElementById('experience-sec').innerHTML = `
  <div class="section-header"><span class="section-num">03</span><h2 class="section-title">Experience</h2></div>
  ${expHTML}`;

/* EDUCATION */
const ed = d.education;
document.getElementById('education-sec').innerHTML = `
  <div class="section-header"><span class="section-num">04</span><h2 class="section-title">Education</h2></div>
  <div class="edu-block">
    <div>
      <div class="edu-degree">${ed.degree}</div>
      <div class="edu-school">${ed.specialisation} &nbsp;·&nbsp; ${ed.school}</div>
      <div class="edu-meta">${ed.duration} &nbsp;·&nbsp; ${ed.courses}</div>
    </div>
    <div>
      <div class="edu-gpa">${ed.gpa}</div>
      <div class="edu-gpa-label">Current GPA</div>
    </div>
  </div>`;

/* CERTIFICATES */
const certsHTML = d.certs.map(c => `
  <div class="cert-item">
    <div class="cert-name"><div class="cert-dot"></div> ${c.name}</div>
    <div class="cert-issuer">${c.issuer}</div>
  </div>`).join('');
document.getElementById('certs-sec').innerHTML = `
  <div class="section-header"><span class="section-num">05</span><h2 class="section-title">Certificates</h2></div>
  <div class="cert-list">${certsHTML}</div>`;

/* FOOTER */
document.getElementById('footer').innerHTML = `
  <span>© 2026 ${d.info.name_line1} ${d.info.name_line2}</span>
  <span>${d.info.eyebrow} · ${d.info.location}</span>
  <span>${d.info.email}</span>`;
</script>

</body>
